name: 기능 구현
description: 새로운 기능 개발 또는 기존 기능 개선 작업을 등록합니다.
title: "[FEAT] "
labels:
  - feature
body:
  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - API
        - 인증 / 인가
        - DB / 데이터 모델
        - 배치 / 스케줄러
        - 성능 / 안정성
        - 운영 / 관측성
        - 개발 환경
        - 기타
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 작업 개요
      description: 무엇을 왜 만드는지 2~3줄로 요약해 주세요.
      placeholder: |
        소셜 로그인 후 JWT 발급 흐름을 구현합니다.
        현재 세션 기반 인증을 사용하고 있어 모바일 클라이언트 연동이 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 구현 항목
      description: 이 이슈에서 완료해야 할 작업을 체크리스트로 적어 주세요.
      placeholder: |
        - [ ] 카카오 OAuth 토큰 검증 API 연동
        - [ ] 신규 사용자 자동 가입 처리
        - [ ] Access / Refresh 토큰 발급 및 Redis 저장
        - [ ] 토큰 재발급 엔드포인트 구현
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 이 이슈를 닫을 수 있는지 기준을 적어 주세요.
      placeholder: |
        - 카카오 액세스 토큰으로 /auth/kakao 호출 시 JWT 반환
        - 만료된 토큰으로 /auth/refresh 호출 시 401 반환
        - 단위 테스트 커버리지 80% 이상
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: 기술 접근 방향
      description: 구현 방법이나 설계 방향에 대해 알고 있는 내용을 적어 주세요. (선택)
      placeholder: |
        - Spring Security OAuth2 Client 사용
        - RefreshToken은 Redis에 TTL 7일로 저장
        - 기존 UserService.findOrCreate() 재사용
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 스키마 변경, API 변경, 배포 영향 등 팀이 알아야 할 사항을 적어 주세요. (선택)
      placeholder: |
        - DB: users 테이블에 kakao_id 컬럼 추가 (마이그레이션 필요)
        - API: POST /auth/kakao 신규 추가
        - 환경 변수: KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET 추가 필요
    validations:
      required: false

  - type: textarea
    id: blockers
    attributes:
      label: 선행 작업 / 의존성
      description: 이 작업을 시작하기 전에 완료되어야 할 작업이나 결정이 있으면 적어 주세요. (선택)
      placeholder: |
        - #42 Redis 연결 설정 완료 후 진행 가능
        - 카카오 앱 등록 및 Client ID 발급 필요 (담당: @hyochan)
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 기획서, 피그마, API 명세, 관련 PR 링크 등을 남겨 주세요. (선택)
    validations:
      required: false
