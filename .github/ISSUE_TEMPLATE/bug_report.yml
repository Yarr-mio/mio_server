name: 버그 리포트
description: 모바일 백엔드 서버에서 발생한 버그를 제보합니다.
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        재현 가능성과 영향 범위를 빠르게 파악할 수 있도록, 확인한 사실 위주로 작성해 주세요.

  - type: checkboxes
    id: preflight
    attributes:
      label: 사전 확인
      options:
        - label: 중복 이슈가 없는지 확인했습니다.
          required: true
        - label: 최신 코드 또는 배포 환경 기준으로 재현 여부를 확인했습니다.
          required: false

  - type: dropdown
    id: area
    attributes:
      label: 영향 범위
      description: 문제가 발생한 영역을 선택해 주세요.
      options:
        - API
        - 인증 / 인가
        - DB / 영속성
        - 배치 / 스케줄러
        - 외부 연동
        - 인프라 / 배포
        - 기타
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 버그 요약
      description: 무엇이 문제인지 한두 문장으로 설명해 주세요.
      placeholder: 특정 API 호출 시 500 응답이 발생합니다.
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: 관련 엔드포인트 또는 기능
      description: 가능하면 API 경로, 서비스명, 작업명을 적어 주세요.
      placeholder: POST /api/v1/sessions
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 리뷰어가 그대로 따라 해볼 수 있게 순서대로 적어 주세요.
      placeholder: |
        1. `docker-compose up` 실행
        2. `POST /api/v1/...` 요청 전송
        3. 응답 또는 로그 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 200 응답과 함께 세션 정보가 반환되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: 500 응답이 반환되고 `ConstraintViolationException` 로그가 출력됩니다.
    validations:
      required: true

  - type: textarea
    id: request_sample
    attributes:
      label: 요청 / 입력값 예시
      description: 재현에 필요한 요청 본문, 파라미터, 헤더 등을 남겨 주세요.
      render: json
      placeholder: |
        {
          "example": "value"
        }
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: 관련 로그, 스택 트레이스, 쿼리 오류 등을 붙여 주세요.
      render: shell
      placeholder: 예외 로그를 여기에 붙여 넣어 주세요.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 가능한 범위에서 실제 환경 정보를 적어 주세요.
      placeholder: |
        - OS:
        - JDK:
        - Branch / Commit:
        - DB / Infra:
        - 실행 방식: local / dev / staging / prod
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 원인 추정, 임시 우회책, 관련 링크가 있으면 적어 주세요.
    validations:
      required: false
