spring:
  application:
    name: mio
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false



  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  threads:
    virtual:
      enabled: true

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: 900

kakao:
  api-url: ${KAKAO_API_URL:https://kapi.kakao.com}
  app-id: ${KAKAO_APP_ID}

apple:
  jwks-url: ${APPLE_JWKS_URL:https://appleid.apple.com/auth/keys}
  app-id: ${APPLE_APP_ID}

apns:
  key-content: ${APNS_KEY_CONTENT:}
  key-path: ${APNS_KEY_PATH:}
  key-id: ${APNS_KEY_ID:}
  team-id: ${APNS_TEAM_ID:}
  bundle-id: ${APNS_BUNDLE_ID:}
  is-production: ${APNS_IS_PRODUCTION:false}

fcm:
  credentials-json: ${FCM_CREDENTIALS_JSON:}

notification:
  test-endpoint-enabled: false
  cron:
    morning: ${NOTIFICATION_CRON_MORNING:0 0 9 * * *}
    afternoon: ${NOTIFICATION_CRON_AFTERNOON:0 0 12 * * *}
    evening: ${NOTIFICATION_CRON_EVENING:0 0 22 * * *}

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com

logging:
  level:
    com.mio: INFO
