services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mio
      POSTGRES_USER: mio
      POSTGRES_PASSWORD: mio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mio -d mio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mio-redis
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
